
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados de RPG - Lysander</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #e2e2e2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        p.subtitle {
            color: #8f94fb;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .dice-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
            margin-bottom: 25px;
        }

        .dice-btn {
            background-color: #16213e;
            color: #fff;
            border: 2px solid #0f3460;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .dice-btn:hover {
            background-color: #0f3460;
            border-color: #e94560;
            transform: translateY(-2px);
        }

        .dice-btn.custom {
            background-color: #0f3460;
            border-color: #8f94fb;
        }
        .dice-btn.custom:hover {
            background-color: #8f94fb;
            color: #1a1a2e;
        }

        /* Estilos do botão de sequência */
        .sequence-container {
            margin-bottom: 30px;
        }

        .seq-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        .seq-btn.active {
            background-color: #dc3545;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.4);
        }

        .result-display {
            background-color: #16213e;
            border: 3px solid #e94560;
            border-radius: 12px;
            width: 220px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }

        /* Destaca a caixa quando está somando */
        .result-display.accumulating {
            border-color: #28a745;
        }

        #result-value {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            line-height: 1;
        }

        #result-type {
            font-size: 1.2rem;
            color: #8f94fb;
            margin-top: 5px;
            text-align: center;
            max-width: 90%;
        }

        .shake {
            animation: shakeAnima 0.15s ease-in-out alternate 2;
        }

        @keyframes shakeAnima {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <h1>Taça de Dados RPG</h1>
    <p class="subtitle">Grimório Digital do Lysander</p>

    <div class="dice-container">
        <button class="dice-btn" onclick="rolarDado(4)">d4</button>
        <button class="dice-btn" onclick="rolarDado(6)">d6</button>
        <button class="dice-btn" onclick="rolarDado(8)">d8</button>
        <button class="dice-btn" onclick="rolarDado(12)">d12</button>
        <button class="dice-btn" onclick="rolarDado(20)">d20</button>
        <button class="dice-btn custom" onclick="perguntarLados()">Outro...</button>
    </div>

    <div class="sequence-container">
        <button id="btn-sequencia" class="seq-btn" onclick="alternarSequencia()">Iniciar Sequência</button>
    </div>

    <div class="result-display" id="dice-box">
        <div id="result-value">-</div>
        <div id="result-type">Rolagem</div>
    </div>

    <script>
        // Variáveis de controle do Modo Sequência
        let emSequencia = false;
        let somaSequencia = 0;
        let dadosRolados = [];

        function rolarDado(lados) {
            const displayValue = document.getElementById('result-value');
            const displayType = document.getElementById('result-type');
            const diceBox = document.getElementById('dice-box');

            // Efeito de tremer a caixinha
            diceBox.classList.remove('shake');
            void diceBox.offsetWidth; 
            diceBox.classList.add('shake');

            // Cálculo do dado
            const resultado = Math.floor(Math.random() * lados) + 1;

            if (emSequencia) {
                // Se estiver no modo sequência, acumula o valor
                somaSequencia += resultado;
                dadosRolados.push('d' + lados + '(' + resultado + ')');
                
                // Mostra o resultado atual e o que já foi rolado
                displayValue.textContent = resultado;
                displayType.textContent = "Soma atual: " + somaSequencia;
            } else {
                // Modo normal de rolagem única
                displayValue.textContent = resultado;
                displayType.textContent = 'd' + lados;

                // Cores especiais para o d20 normal
                if (lados === 20 && resultado === 20) {
                    displayValue.style.color = '#00ffcc'; 
                } else if (lados === 20 && resultado === 1) {
                    displayValue.style.color = '#ff4a4a'; 
                } else {
                    displayValue.style.color = '#fff'; 
                }
            }
        }

        // Função que liga e desliga a sequência
        function alternarSequencia() {
            const btn = document.getElementById('btn-sequencia');
            const diceBox = document.getElementById('dice-box');
            const displayValue = document.getElementById('result-value');
            const displayType = document.getElementById('result-type');

            if (!emSequencia) {
                // LIGA A SEQUÊNCIA
                emSequencia = true;
                somaSequencia = 0;
                dadosRolados = [];
                
                btn.textContent = "Encerrar Sequência";
                btn.classList.add('active');
                diceBox.classList.add('accumulating');
                
                displayValue.textContent = "0";
                displayType.textContent = "Modo Sequência Ativo";
                displayValue.style.color = '#28a745'; // Cor verde para indicar o modo
            } else {
                // DESLIGA A SEQUÊNCIA E MOSTRA O TOTAL
                emSequencia = false;
                
                btn.textContent = "Iniciar Sequência";
                btn.classList.remove('active');
                diceBox.classList.remove('accumulating');
                
                // Exibe o total final acumulado
                displayValue.textContent = somaSequencia;
                displayType.textContent = "Total de: " + dadosRolados.join(' + ');
                displayValue.style.color = '#fff';
            }
        }

        function perguntarLados() {
            const resposta = prompt("Quantos lados você quer que o dado tenha?");
            const quantidadeLados = parseInt(resposta);

            if (!isNaN(quantidadeLados) && quantidadeLados > 0) {
                rolarDado(quantidadeLados);
            } else if (resposta !== null) {
                alert("Por favor, digite apenas números inteiros maiores que 0!");
            }
        }
    </script>
</body>
</html>
