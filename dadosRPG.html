<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Taça de Dados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #111122 0%, #1a1a3a 100%);
            color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .app-container {
            background-color: rgba(30, 30, 60, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #9d9eff;
            margin-bottom: 30px;
            font-size: 1rem;
            font-weight: 500;
        }

        .dice-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .dice-btn {
            background: #25254e;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .dice-btn:hover {
            background: #313168;
            border-color: #8f94fb;
            transform: translateY(-2px);
        }

        .dice-btn.custom {
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            border: none;
        }
        
        .dice-btn.custom:hover {
            filter: brightness(1.1);
        }

        .dice-btn:active {
            transform: translateY(1px);
        }

        .sequence-box {
            width: 100%;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .seq-btn {
            background-color: #218838;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(33, 136, 56, 0.3);
            width: 100%;
        }

        .seq-btn.active {
            background-color: #c82333;
            box-shadow: 0 4px 15px rgba(200, 35, 51, 0.3);
        }

        .result-card {
            background: rgba(15, 15, 35, 0.8);
            border: 2px solid #3c3c78;
            border-radius: 16px;
            width: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
            transition: border-color 0.3s ease;
        }

        .result-card.accumulating {
            border-color: #218838;
        }

        #result-value {
            font-size: 4.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            margin-bottom: 8px;
            transition: color 0.2s ease;
        }

        #result-type {
            font-size: 1rem;
            color: #a5a6f6;
            font-weight: 500;
            text-align: center;
            line-height: 1.4;
        }

        .shake {
            animation: softShake 0.4s ease-in-out;
        }

        @keyframes softShake {
            0% { transform: scale(1); }
            15% { transform: scale(0.92) rotate(-2deg); }
            45% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(0.98) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Taça de Dados</h1>
        <p class="subtitle">Mesa de RPG</p>

        <div class="dice-grid">
            <button class="dice-btn" onclick="rolarDado(4)">d4</button>
            <button class="dice-btn" onclick="rolarDado(6)">d6</button>
            <button class="dice-btn" onclick="rolarDado(8)">d8</button>
            <button class="dice-btn" onclick="rolarDado(12)">d12</button>
            <button class="dice-btn" onclick="rolarDado(20)">d20</button>
            <button class="dice-btn custom" onclick="perguntarLados()">Outro</button>
        </div>

        <div class="sequence-box">
            <button id="btn-sequencia" class="seq-btn" onclick="alternarSequencia()">Iniciar Sequência</button>
        </div>

        <div class="result-card" id="dice-box">
            <div id="result-value">-</div>
            <div id="result-type">Pronto para rolar</div>
        </div>
    </div>

    <script>
        let emSequencia = false;
        let somaSequencia = 0;
        let dadosRolados = [];
        let rolando = false; // Impede cliques múltiplos durante a animação

        function rolarDado(lados) {
            if (rolando) return; // Trava o botão enquanto os números passam correrndo

            const displayValue = document.getElementById('result-value');
            const displayType = document.getElementById('result-type');
            const diceBox = document.getElementById('dice-box');

            rolando = true;
            displayValue.style.color = '#fff';

            // Ativa o pulo visual na caixa
            diceBox.classList.remove('shake');
            void diceBox.offsetWidth; 
            diceBox.classList.add('shake');

            // Resultado real que vai sair no final
            const resultadoFinal = Math.floor(Math.random() * lados) + 1;

            //Configuração do efeito dos números passando correndo
            let duracaoEfeito = 400; // Tempo total passando números (milissegundos)
            let intervaloTroca = 40; // Velocidade da troca de números
            let tempoDecorrido = 0;

            let efeitoRoleta = setInterval(() => {
                // Gera números aleatórios temporários baseados no tamanho do dado
                let numeroTemporario = Math.floor(Math.random() * lados) + 1;
                displayValue.textContent = numeroTemporario;
                
                if (emSequencia) {
                    displayType.textContent = "Calculando...";
                } else {
                    displayType.textContent = "Rolando d" + lados + "...";
                }

                tempoDecorrido += intervaloTroca;

                // Quando o tempo do efeito acaba, para a roleta e crava o resultado real
                if (tempoDecorrido >= duracaoEfeito) {
                    clearInterval(efeitoRoleta);
                    
                    displayValue.textContent = resultadoFinal;
                    rolando = false;

                    if (emSequencia) {
                        somaSequencia += resultadoFinal;
                        dadosRolados.push('d' + lados + '(' + resultadoFinal + ')');
                        displayType.textContent = "Soma acumulada: " + somaSequencia;
                    } else {
                        displayType.textContent = 'Resultado do d' + lados;

                        // Cores para d20 Crítico ou Desastre
                        if (lados === 20 && resultadoFinal === 20) {
                            displayValue.style.color = '#00ffcc'; 
                        } else if (lados === 20 && resultadoFinal === 1) {
                            displayValue.style.color = '#ff4a4a'; 
                        }
                    }
                }
            }, intervaloTroca);
        }

        function alternarSequencia() {
            if (rolando) return;

            const btn = document.getElementById('btn-sequencia');
            const diceBox = document.getElementById('dice-box');
            const displayValue = document.getElementById('result-value');
            const displayType = document.getElementById('result-type');

            if (!emSequencia) {
                emSequencia = true;
                somaSequencia = 0;
                dadosRolados = [];
                
                btn.textContent = "Encerrar Sequência";
                btn.classList.add('active');
                diceBox.classList.add('accumulating');
                
                displayValue.textContent = "0";
                displayType.textContent = "Modo Sequência Ativo";
                displayValue.style.color = '#28a745';
            } else {
                emSequencia = false;
                
                btn.textContent = "Iniciar Sequência";
                btn.classList.remove('active');
                diceBox.classList.remove('accumulating');
                
                displayValue.textContent = somaSequencia;
                displayType.textContent = "Total: " + dadosRolados.join(' + ');
                displayValue.style.color = '#fff';
            }
        }

        function perguntarLados() {
            if (rolando) return;
            const resposta = prompt("Quantos lados você quer que o dado tenha?");
            const quantidadeLados = parseInt(resposta);

            if (!isNaN(quantidadeLados) && quantidadeLados > 0) {
                rolarDado(quantidadeLados);
            } else if (resposta !== null) {
                alert("Por favor, digite apenas números inteiros maiores que 0!");
            }
        }
    </script>
</body>
</html>
